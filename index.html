<title>To Do</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #ffffff; min-height: 100vh; padding: 12px; color: #1a1a1a; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
  .login-card { background: white; border-radius: 16px; border: 1px solid #e0ddd8; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
  .login-logo { font-size: 36px; margin-bottom: 12px; }
  .login-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
  .login-input { width: 100%; padding: 11px 16px; border: 1px solid #d0cdc8; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #fafaf8; outline: none; text-align: center; letter-spacing: .1em; margin-bottom: 10px; transition: border-color .15s; }
  .login-input:focus { border-color: #888; background: white; }
  .login-remember { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 12px; font-size: 12px; color: #888; cursor: pointer; }
  .login-btn { width: 100%; padding: 11px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .login-btn:hover { background: #333; }
  .login-error { display: none; margin-top: 10px; font-size: 12px; color: #a32d2d; background: #fcebeb; border-radius: 8px; padding: 8px 12px; }
  .login-error.show { display: block; }

  /* APP */
  #app { display: none; }
  .app-wrap { max-width: 1400px; margin: 0 auto; background: white; border-radius: 14px; overflow: hidden; border: 1px solid #e0ddd8; }

  .toolbar { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: #f8f7f4; border-bottom: 1px solid #e0ddd8; flex-wrap: wrap; }
  .tool-title { font-size: 14px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .task-count { font-size: 11px; color: #888; }
  .status { font-size: 10px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .s-ok { background: #eaf3de; color: #3b6d11; }
  .s-err { background: #fcebeb; color: #a32d2d; }
  .s-load { background: #f1efe8; color: #5f5e5a; }

  .btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #d0cdc8; background: white; color: #444; font-weight: 500; transition: background .15s; }
  .btn:hover { background: #f0ede8; }
  .btn-mic { display: flex; align-items: center; gap: 6px; background: #e24b4a; color: white; border-color: #e24b4a; }
  .btn-mic:hover { background: #a32d2d; border-color: #a32d2d; }
  .btn-mic.on { background: #a32d2d; animation: blink 1s infinite; }
  .btn-logout { background: transparent; border-color: #d0cdc8; color: #999; font-size: 11px; padding: 5px 10px; }
  .shortcut-hint { font-size: 10px; color: #bbb; padding: 0 4px; }

  /* RECHERCHE */
  .search-wrap { position: relative; }
  .search-inp { padding: 6px 28px 6px 10px; border: 1px solid #d0cdc8; border-radius: 8px; font-size: 12px; background: white; color: #1a1a1a; outline: none; width: 160px; transition: border-color .15s, width .2s; }
  .search-inp:focus { border-color: #888; width: 220px; }
  .search-inp::placeholder { color: #bbb; }
  .search-clear { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #bbb; cursor: pointer; display: none; background: none; border: none; line-height: 1; }
  .search-clear.show { display: block; }
  .card.hidden { display: none; }

  /* CONFIRMATION SUPPRESSION */
  .confirm-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 300; align-items: center; justify-content: center; }
  .confirm-bg.open { display: flex; }
  .confirm-box { background: white; border-radius: 12px; padding: 20px 22px; width: 100%; max-width: 320px; border: 1px solid #e0ddd8; text-align: center; }
  .confirm-msg { font-size: 13px; color: #1a1a1a; margin-bottom: 6px; font-weight: 500; }
  .confirm-sub { font-size: 11px; color: #888; margin-bottom: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .confirm-btns { display: flex; gap: 8px; justify-content: center; }
  .confirm-cancel { padding: 7px 18px; border: 1px solid #d0cdc8; border-radius: 8px; font-size: 13px; cursor: pointer; background: white; color: #666; }
  .confirm-ok { padding: 7px 18px; background: #e24b4a; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .confirm-ok:hover { background: #a32d2d; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.65} }

  /* FAB MOBILE */
  .fab { display: none; position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: #2d5a2d; color: white; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.2); align-items: center; justify-content: center; }

  /* MOBILE ACTION BAR */
  .mobile-action-bar { display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: white; border-radius: 14px; border: 1px solid #e0ddd8; box-shadow: 0 4px 24px rgba(0,0,0,0.18); padding: 10px 14px; gap: 8px; z-index: 60; align-items: center; white-space: nowrap; }
  .mobile-action-bar.show { display: flex; }
  .mab-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; border: none; }
  .mab-btn:active { opacity: .75; }
  .mab-edit { background: #1a1a1a; color: white; }
  .mab-del { background: #fcebeb; color: #a32d2d; border: 1px solid #f09595 !important; }
  .mab-sep { width: 1px; height: 28px; background: #e0ddd8; margin: 0 2px; }
  .mab-col { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 8px; }
  .mab-col:active { background: #f0ede8; }

  /* CARTE SÉLECTIONNÉE */
  .card.selected { border: 2px solid #2d5a2d !important; box-shadow: 0 0 0 3px rgba(45,90,45,0.15) !important; }

  @media screen and (max-width: 768px) {
    body { padding: 4px !important; }
    .app-wrap { border-radius: 8px !important; overflow: hidden !important; }
    .toolbar { padding: 6px 8px !important; gap: 5px !important; flex-wrap: nowrap !important; }
    .tool-title { font-size: 11px !important; white-space: nowrap !important; overflow: hidden !important; flex-shrink: 1 !important; min-width: 0 !important; max-width: 110px !important; }
    .task-count { display: none !important; }
    .status { font-size: 9px !important; padding: 2px 5px !important; white-space: nowrap !important; flex-shrink: 0 !important; }
    .search-wrap { display: none !important; }
    .shortcut-hint { display: none !important; }
    .btn { font-size: 11px !important; padding: 5px 8px !important; white-space: nowrap !important; flex-shrink: 0 !important; }
    .btn-mic { font-size: 11px !important; padding: 5px 8px !important; }
    .btn-logout { font-size: 10px !important; padding: 4px 6px !important; }
    .board { display: grid !important; grid-template-columns: calc(50% - 3px) calc(50% - 3px) !important; gap: 5px !important; padding: 5px !important; min-height: unset !important; width: calc(100vw - 8px) !important; max-width: calc(100vw - 8px) !important; overflow: hidden !important; }
    .col { padding: 6px !important; gap: 4px !important; min-height: 120px !important; min-width: 0 !important; max-width: 100% !important; overflow: hidden !important; width: 100% !important; }
    .col-header { padding-bottom: 4px !important; margin-bottom: 1px !important; gap: 4px !important; }
    .col-title { font-size: 9px !important; letter-spacing: .01em !important; }
    .col-count { font-size: 9px !important; padding: 1px 4px !important; }
    .col-dot { width: 6px !important; height: 6px !important; }
    .card { padding: 5px 5px !important; gap: 4px !important; border-radius: 6px !important; min-width: 0 !important; max-width: 100% !important; overflow: hidden !important; }
    .picto { font-size: 13px !important; flex-shrink: 0 !important; }
    .card-text { min-width: 0 !important; overflow: hidden !important; flex: 1 !important; }
    .card-subject { font-size: 10px !important; line-height: 1.25 !important; white-space: normal !important; word-break: break-word !important; overflow: hidden !important; }
    .card-check { width: 13px !important; height: 13px !important; flex-shrink: 0 !important; }
    .card-check.checked::after { font-size: 7px !important; }
    .card-drag-handle { display: none !important; }
    .card-btns { display: none !important; }
    .recur-badge { font-size: 8px !important; }
    .done-toggle { font-size: 9px !important; padding: 3px 2px !important; }
    .done-zone { margin-top: 4px !important; }
    .pictos-legend { display: none !important; }
    .fab { display: flex !important; width: 50px !important; height: 50px !important; font-size: 26px !important; bottom: 20px !important; right: 16px !important; }
    .login-card { padding: 28px 20px !important; }
  }

  /* PICTO SELECTOR */
  .picto-selector { display: none; flex-wrap: wrap; gap: 6px; margin-top: 8px; padding: 10px; background: #f8f7f4; border-radius: 10px; border: 1px solid #e0ddd8; }
  .picto-selector.show { display: flex; }
  .picto-opt { font-size: 20px; cursor: pointer; padding: 5px 7px; border-radius: 7px; border: 1.5px solid transparent; transition: all .15s; line-height: 1; }
  .picto-opt:hover { background: #eee; }
  .picto-opt.selected { border-color: #185fa5; background: #e6f1fb; }
  .picto-label { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }
  .picto-current { font-size: 22px; cursor: pointer; padding: 3px 6px; border-radius: 7px; border: 1px solid #d0cdc8; background: white; transition: background .15s; }
  .picto-current:hover { background: #f0ede8; }
  .picto-row { display: flex; align-items: center; gap: 8px; }

  /* RÉCURRENCE */
  .recur-badge { font-size: 10px; color: #185fa5; background: #e6f1fb; border-radius: 4px; padding: 1px 5px; margin-top: 3px; display: inline-block; }
  .recur-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .recur-check { cursor: pointer; }
  .recur-sel { padding: 5px 8px; border: 1px solid #d0cdc8; border-radius: 8px; font-size: 12px; background: white; color: #1a1a1a; cursor: pointer; }

  /* OFFLINE / LISTEN */
  .offline-bar { display: none; align-items: center; gap: 8px; padding: 5px 16px; background: #faeeda; border-bottom: 1px solid #fac775; font-size: 11px; color: #854f0b; }
  .offline-bar.show { display: flex; }
  .listen-bar { display: none; align-items: center; gap: 8px; padding: 6px 16px; background: #fcebeb; border-bottom: 1px solid #f09595; font-size: 11px; color: #a32d2d; }
  .listen-bar.show { display: flex; }
  .dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: #e24b4a; animation: blink .9s infinite; flex-shrink: 0; }

  .input-panel { display: none; align-items: center; gap: 8px; padding: 9px 16px; border-bottom: 1px solid #e0ddd8; flex-wrap: wrap; background: #fafaf8; }
  .input-panel.open { display: flex; }
  .inp { padding: 7px 12px; border: 1px solid #d0cdc8; border-radius: 8px; font-size: 12px; background: white; color: #1a1a1a; outline: none; transition: border-color .15s; }
  .inp:focus { border-color: #888; }
  .inp-action { flex: 1; min-width: 130px; }
  .inp-subject { flex: 2; min-width: 200px; }
  .sel-col { padding: 7px 10px; border: 1px solid #d0cdc8; border-radius: 8px; font-size: 12px; background: white; color: #1a1a1a; cursor: pointer; }
